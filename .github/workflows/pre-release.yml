name: Create Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Pre-release version (optional - auto-bumps patch if empty, e.g. 0.1.9-beta.1)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            CURRENT=$(jq -r '.version' manifest.json)
            VERSION=$(echo $CURRENT | awk -F. '{print $1"."$2"."$3+1"-beta.1"}')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating pre-release: $VERSION"

      - name: Update manifest.json
        run: |
          CLEAN_VERSION=$(echo "${{ steps.version.outputs.VERSION }}" | sed 's/-beta.*//')
          jq '.version = "'$CLEAN_VERSION'"' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json
          cat manifest.json | jq '.version'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            main.js styles.css manifest.json \
            --prerelease \
            --title "Pre-release ${{ steps.version.outputs.VERSION }}" \
            --notes "This is a pre-release version with the latest features. Use with caution."
